<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ site.title }}</title>
<link rel="stylesheet" href="{{ site.root }}static/style.css">
</head>
<body>
<header class="topbar">
  <a class="brand" href="{{ site.root }}">{{ site.title }}</a>
  <nav class="nav">
    <a href="{{ site.root }}">timeline</a>
    <a href="{{ site.root }}search">search</a>
{% if logged_in %}
    <a href="{{ site.root }}bookmarks">bookmarks</a>
    <a href="{{ site.root }}profile">profile</a>
    <span class="nav-me">{{ me.handle }}</span>
    <form class="inline" method="post" action="{{ site.root }}logout">
      <input type="hidden" name="csrf" value="{{ csrf }}">
      <button type="submit" class="linkbtn">log out</button>
    </form>
{% else %}
    <a href="{{ site.root }}login">log in</a>
{% endif %}
  </nav>
</header>
<main>
{% if length(error) > 0 %}
<p class="error">{{ error }}</p>
{% endif %}
