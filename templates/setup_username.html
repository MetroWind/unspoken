{% include "_header.html" %}
<section class="narrow">
  <h1>Choose a username</h1>
  <p>This is permanent and appears in your handle
     <code>@username@{{ site.public_domain }}</code>.</p>
  <form method="post" action="{{ site.root }}setup-username">
    <input type="hidden" name="csrf" value="{{ csrf }}">
    <label>Username
      <input name="username" pattern="[a-z0-9_]+" maxlength="30" required
             value="{{ suggested_name }}">
    </label>
    <label>Display name
      <input name="display_name" value="{{ suggested_name }}">
    </label>
    <button type="submit">Create account</button>
  </form>
</section>
{% include "_footer.html" %}
