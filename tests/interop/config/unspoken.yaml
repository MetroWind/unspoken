url_root: "http://unspoken.test:8080/"
public_domain: "unspoken.test"
listen_address: "0.0.0.0"
listen_port: 8080

database_path: "/data/unspoken.db"
attachment_dir: "/data/attachments"
emoji_dir: "/data/emoji"
template_dir: "/app/templates"
static_dir: "/app/static"

posts_per_page: 20
http_signature_skew_seconds: 300
thread_fetch_max_depth: 20
sqlite_busy_timeout_ms: 5000

job_workers: 2
job_max_retries: 3
job_retry_base_delay_seconds: 1

max_upload_bytes: 10485760

oidc:
  issuer: "http://fake-oidc.test:9000"
  client_id: "unspoken-interop"
  client_secret: "unspoken-interop-secret"
  scopes: "openid profile"

nodeinfo:
  software_name: "unspoken"
  open_registrations: true
  description: "unspoken interop test instance"

dev:
  allow_http_url_root: true
  outbound_allow_private_hosts:
    - akkoma.test
